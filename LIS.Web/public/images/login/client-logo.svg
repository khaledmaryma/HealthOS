<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" role="img" aria-label="Your organization logo">
  <defs>
    <linearGradient id="sky" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0c4a6e"/>
      <stop offset="55%" style="stop-color:#0e7490"/>
      <stop offset="100%" style="stop-color:#155e75"/>
    </linearGradient>
    <linearGradient id="shine" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.12"/>
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="24" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="800" height="800" fill="url(#sky)"/>
  <rect width="800" height="800" fill="url(#shine)"/>
  <!-- Subtle care + data motif -->
  <g opacity="0.22" fill="#fff">
    <circle cx="400" cy="360" r="140"/>
    <circle cx="260" cy="420" r="48"/>
    <circle cx="540" cy="420" r="48"/>
    <circle cx="400" cy="520" r="56"/>
    <path stroke="#fff" stroke-width="6" fill="none" d="M340 400h120M400 340v120"/>
  </g>
  <g filter="url(#soft)" opacity="0.35">
    <ellipse cx="400" cy="680" rx="320" ry="120" fill="#000"/>
  </g>
  <rect x="240" y="280" width="320" height="200" rx="16" fill="#fff" fill-opacity="0.14" stroke="#fff" stroke-opacity="0.35" stroke-width="2"/>
  <path fill="#fff" d="M400 320c-44 0-80 36-80 80s36 80 80 80 80-36 80-80-36-80-80-80zm0 24c31 0 56 25 56 56s-25 56-56 56-56-25-56-56 25-56 56-56z"/>
  <rect x="388" y="352" width="24" height="96" rx="4" fill="#fff"/>
  <rect x="352" y="388" width="96" height="24" rx="4" fill="#fff"/>
  <text x="400" y="560" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="36" font-weight="600" letter-spacing="0.02em" fill="#f0f9ff">Your health system</text>
  <text x="400" y="608" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="22" fill="#bae6fd" opacity="0.95">Replace this file with your official logo</text>
  <text x="400" y="648" text-anchor="middle" font-family="system-ui, sans-serif" font-size="17" fill="#7dd3fc" opacity="0.85">PNG or SVG — same path: images/login/client-logo.svg</text>
</svg>
