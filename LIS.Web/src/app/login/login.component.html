<div class="login-page">
  <form class="login-card" (submit)="submit($event)">
    <h2>Sign In</h2>
    <p class="text-muted">Use your User Management credentials.</p>

    <label class="form-label">Username</label>
    <input
      class="form-control"
      [ngModel]="username()"
      (ngModelChange)="username.set($event)"
      name="username"
      required
    />

    <label class="form-label">Password</label>
    <input
      class="form-control"
      type="password"
      [ngModel]="password()"
      (ngModelChange)="password.set($event)"
      name="password"
      required
    />

    <button class="btn btn-primary w-100 mt-3" [disabled]="isSubmitting()">
      {{ isSubmitting() ? 'Signing in...' : 'Sign In' }}
    </button>
  </form>
</div>
