<div class="um-page">
  <div class="um-header">
    <div>
      <h2>User Management - Profiles</h2>
      <p>Define profiles and admin access.</p>
    </div>
    <div class="um-actions">
      <button class="btn btn-sm btn-primary" (click)="clickAdd()">Add</button>
      <button class="btn btn-sm btn-outline-secondary" [disabled]="!selectedItem()" (click)="clickEdit()">Edit</button>
      <button class="btn btn-sm btn-outline-danger" [disabled]="!selectedItem()" (click)="remove()">Delete</button>
    </div>
  </div>

  <div class="um-toolbar">
    <input
      type="text"
      class="form-control form-control-sm"
      placeholder="Search profile name..."
      [value]="query()"
      (input)="onSearchChange(($any($event.target).value))"
    />
  </div>

  <div class="um-table">
    <table class="table table-sm table-hover">
      <thead>
        <tr>
          <th>Name</th>
          <th>Admin</th>
        </tr>
      </thead>
      <tbody>
        <tr
          *ngFor="let item of filtered()"
          (click)="selectRow(item)"
          [class.table-active]="isSelected(item)"
        >
          <td>
            <a
              class="link-primary fw-semibold text-decoration-underline"
              [routerLink]="['/user-management/profile-permissions']"
              [queryParams]="{ profileId: item.id }"
              (click)="$event.stopPropagation()"
            >
              {{ item.name }}
            </a>
          </td>
          <td>
            <span class="badge" [class.bg-success]="item.isAdmin" [class.bg-secondary]="!item.isAdmin">
              {{ item.isAdmin ? 'Yes' : 'No' }}
            </span>
          </td>
        </tr>
      </tbody>
    </table>
  </div>

  <div class="um-form-backdrop" *ngIf="showForm()">
    <form class="um-form" (submit)="save($event)">
      <div class="um-form-header">
        <h5>{{ editItem()?.id ? 'Edit Profile' : 'New Profile' }}</h5>
      </div>
      <div class="um-form-body">
        <label class="form-label">Name</label>
        <input class="form-control form-control-sm" [(ngModel)]="editItem()!.name" name="name" required />

        <div class="form-check mt-2">
          <input class="form-check-input" type="checkbox" [(ngModel)]="editItem()!.isAdmin" name="isAdmin" />
          <label class="form-check-label">Is Admin</label>
        </div>
      </div>
      <div class="um-form-footer">
        <button type="button" class="btn btn-sm btn-outline-secondary" (click)="cancel()">Cancel</button>
        <button type="submit" class="btn btn-sm btn-primary">Save</button>
      </div>
    </form>
  </div>
</div>
